<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 630"
     width="1200" height="630"
     role="img"
     aria-label="SecurityRecipes — community-driven recipes for agentic security remediation">
  <title>SecurityRecipes</title>
  <desc>Open Graph card for SecurityRecipes — a community-driven library of recipes for turning AI coding agents into autonomous security remediators.</desc>

  <!-- Background gradient: deep navy → violet, matching the site's dark theme. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0a0d1a"/>
      <stop offset="55%"  stop-color="#15163a"/>
      <stop offset="100%" stop-color="#2a1040"/>
    </linearGradient>

    <radialGradient id="orb1" cx="0.18" cy="0.22" r="0.45">
      <stop offset="0%"   stop-color="#00e5ff" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#00e5ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orb2" cx="0.85" cy="0.78" r="0.5">
      <stop offset="0%"   stop-color="#7c5cff" stop-opacity="0.4"/>
      <stop offset="60%"  stop-color="#7c5cff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#7c5cff"/>
    </linearGradient>

    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48"
            fill="none" stroke="rgba(255,255,255,0.03)"
            stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Layered background. -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>

  <!-- Top accent bar. -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- Site mark (top-left). -->
  <g transform="translate(80, 90)" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace">
    <rect x="0" y="0" width="14" height="14" fill="#00e5ff"/>
    <rect x="20" y="0" width="14" height="14" fill="#7c5cff"/>
    <text x="48" y="12" fill="#e6e8f0" font-size="20" letter-spacing="2">SECURITY-RECIPES.AI</text>
  </g>

  <!-- Headline. -->
  <g font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
    <text x="80" y="260"
          fill="#f5f7fb" font-size="84" font-weight="700"
          letter-spacing="-1.5">
      Agentic security
    </text>
    <text x="80" y="350"
          fill="#f5f7fb" font-size="84" font-weight="700"
          letter-spacing="-1.5">
      <tspan>remediation,</tspan>
      <tspan fill="url(#accent)" font-weight="700"> reviewed.</tspan>
    </text>

    <!-- Subhead. -->
    <text x="80" y="430"
          fill="#9ca3af" font-size="30" font-weight="400">
      Community recipes for turning Copilot, Claude, Cursor,
    </text>
    <text x="80" y="470"
          fill="#9ca3af" font-size="30" font-weight="400">
      Codex, and Devin into autonomous remediators.
    </text>
  </g>

  <!-- Tag pills (bottom). -->
  <g transform="translate(80, 530)" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="18">
    <g>
      <rect x="0" y="0" width="180" height="38" rx="19"
            fill="rgba(0, 229, 255, 0.10)" stroke="rgba(0, 229, 255, 0.45)"/>
      <text x="90" y="25" fill="#67e8f9" text-anchor="middle">CVE recipes</text>
    </g>
    <g transform="translate(196, 0)">
      <rect x="0" y="0" width="200" height="38" rx="19"
            fill="rgba(124, 92, 255, 0.10)" stroke="rgba(124, 92, 255, 0.45)"/>
      <text x="100" y="25" fill="#c4b5fd" text-anchor="middle">Prompt library</text>
    </g>
    <g transform="translate(412, 0)">
      <rect x="0" y="0" width="220" height="38" rx="19"
            fill="rgba(255, 78, 203, 0.10)" stroke="rgba(255, 78, 203, 0.45)"/>
      <text x="110" y="25" fill="#f0abfc" text-anchor="middle">Reviewer-gated</text>
    </g>
    <g transform="translate(648, 0)">
      <rect x="0" y="0" width="200" height="38" rx="19"
            fill="rgba(134, 239, 172, 0.10)" stroke="rgba(134, 239, 172, 0.45)"/>
      <text x="100" y="25" fill="#86efac" text-anchor="middle">MCP-compatible</text>
    </g>
  </g>

  <!-- Decorative corner accent (bottom-right). -->
  <g transform="translate(1040, 470)" stroke="url(#accent)" stroke-width="2" fill="none" opacity="0.6">
    <circle cx="40" cy="40" r="36"/>
    <circle cx="40" cy="40" r="22"/>
    <circle cx="40" cy="40" r="8" fill="url(#accent)" stroke="none" opacity="0.85"/>
  </g>
<text x="64" y="560" fill="#c8cdd9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="32">The trusted secure context layer for agentic AI and MCP servers</text></svg>
